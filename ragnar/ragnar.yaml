version: 0.1

providers:
  default: openrouter
  allowed:
    - local
    - openai
    - anthropic
    - openrouter

# Model strings use Letta's provider handle format: "<letta_provider>/<upstream>/<model>".
# Every role below is routed through the single OpenRouter key in vendor/letta/.env,
# but each role can point at a different upstream vendor (Anthropic, DeepSeek, Moonshot
# Kimi, Google, OpenAI) purely by changing this string -- no extra keys needed per vendor.
models:
  # Free, keyless embedding hosted by Letta itself -- used for every role's
  # Letta agent regardless of which chat-completion vendor that role uses.
  embedding: letta/letta-free
  default:
    provider: openrouter
    model: openrouter/anthropic/claude-haiku-4.5
    temperature: 0.1
    max_tokens: 4096
  roles:
    conductor:
      provider: openrouter
      model: openrouter/anthropic/claude-haiku-4.5
      temperature: 0.1
      max_tokens: 4096
    delivery_architect:
      provider: openrouter
      model: openrouter/anthropic/claude-sonnet-4.5
      temperature: 0.1
      max_tokens: 4096
    backend_engineer:
      provider: openrouter
      model: openrouter/deepseek/deepseek-chat
      temperature: 0.1
      max_tokens: 4096
    frontend_engineer:
      provider: openrouter
      model: openrouter/moonshotai/kimi-k2
      temperature: 0.1
      max_tokens: 4096
    workflow_engineer:
      provider: openrouter
      model: openrouter/google/gemini-2.5-flash
      temperature: 0.1
      max_tokens: 4096
    qa_engineer:
      provider: openrouter
      model: openrouter/openai/gpt-4.1-mini
      temperature: 0.0
      max_tokens: 4096
    integrator:
      provider: openrouter
      model: openrouter/openai/gpt-4.1-mini
      temperature: 0.0
      max_tokens: 4096

memory:
  mode: auto
  max_hits_per_query: 3
  writeback:
    local_jsonl: .ragnar/memory_writebacks.jsonl

execution:
  prepare_worktrees: true
  require_policy_clean_diff: true
  # Gate for whether a role's proposed_patches actually get applied via
  # SafePatchAdapter (still checked against the role's file-scope policy
  # regardless of this flag). Set false to review patches without writing them.
  allow_agent_edits: true
  # Real Letta-native agent-to-agent messaging (send_message_to_agents_matching_tags).
  # Off by default -- flipping this off stops the effect immediately even if an
  # already-provisioned agent still has the tool attached, since the model is
  # never prompted toward using it. Re-provisioning also gates tool attachment
  # itself via ragnar-provision-letta.
  enable_agent_messaging: false
  # Hard cap on Letta's own internal reasoning/tool-call steps per role turn.
  # Letta's server-side default is 50; kept low here to bound cost even with
  # agent-to-agent messaging enabled.
  agent_max_steps: 12
  # How many times the conductor may send plan/QA work back for revision before
  # escalating to the owner instead of looping forever. "repeat until green" in
  # spirit -- raise this if you want more autonomous iteration before being asked.
  max_plan_revisions: 5
  max_qa_revisions: 5

pull_requests:
  mode: draft_only
  draft_dir: .ragnar/pr_drafts
